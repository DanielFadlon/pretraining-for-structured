# Reinit Layers Configuration
# Reinitialize transformer layers from a specified starting layer to the end.
# Useful for studying which layers contain task-specific vs general knowledge.
#
# Usage:
#   python experiments/run_finetuning_script.py configs/examples/reinit_layers.yaml output/reinit_layers_model

# === Reinit Strategy ===
reinit_strategy: "layers"  # Reinitialize transformer layers only

# === Reinitialization Settings ===
# For a model with N transformer layers (`num_hidden_layers = N`):
#   reinit_from_layer: 0   → reinitialize all layers (0-(N-1))
#   reinit_from_layer: k   → reinitialize layers k-(N-1) (keep layers 0-(k-1) pretrained)
#
# Default is 0 (all layers).
reinit_from_layer: 10

# === Required Settings ===
dataset_dir: "data/heart/textual_data"
pretrained_model_id: "meta-llama/Llama-3.2-1B-Instruct"
training_args_yml_path: "configs/training_args.yaml"
prompt_template_func_path: "src.templates.binary_classification.heart_long_response_prompt_formatting_func"

# === Optional Settings ===
# Data files (defaults shown)
train_data_file_name: "train.parquet"
validation_data_file_name: "valid.parquet"

# Evaluation
should_evaluate: true
evaluation_args_yml_path: "configs/evaluation_args/llama/yes_no_eval_args.yaml"

# Training subset (use full dataset by default)
train_set_size:
  percentage: 1  # Use 100% of training data
  # n: 1000     # Or specify exact number of samples

# Quantization
should_quant_to_4bit: false

# Reproducibility
seed: 42

# Cache directory for checkpoints
out_cache_dir: null
